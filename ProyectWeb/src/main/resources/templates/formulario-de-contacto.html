<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="/css/estilo_principal.css">
</head>
<body>
<header class="header">
    <div class="logo">
        <img src="/images/Logo B.png" alt="Imagen Logo" class="logo-img">
        <h1>Formulario de contacto</h1>
    </div>
    <nav class="nav-bar">
        <ul class="menu">
            <li><a href="/">Inicio</a></li>
            <li><a href="/sobre-nosotros">Sobre Nosotros</a></li>
            <li><a href="/servicios">Servicios</a></li>
            <li><a href="/Formulario-de-contacto">Contacto</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>
</header>
<main>
    <div class="formulario-container">
        <form class="contact-form" onsubmit="handleSubmit(event)" action="/submit" method="POST">
            <h2>Datos Personales</h2>
            <div class="form-group">
                <label for="name">Nombre Completo:</label>
                <input type="text" id="name" name="name" placeholder="Ingresa tu nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label for="phone">Teléfono:</label>
                <input type="tel" id="phone" name="phone" placeholder="Ingresa tu número de teléfono" required>
            </div>
            <div class="form-group">
                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" rows="4" placeholder="Escribe tu mensaje aquí" required></textarea>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">Enviar</button>
            </div>
        </form>
        <div class="image-container">
            <img src="/images/img26.jpeg" alt="Imagen de Contacto" class="form-image">
        </div>
    </div>
    <div class="confirmation-container" style="display: none; text-align: center;">
        <h2>¡Gracias!</h2>
        <p>Tus datos han sido enviados correctamente.</p>
        <button onclick="goToHome()" class="btn btn-secondary">Volver a la Página Principal</button>
    </div>
</main>
<footer>
    <p>&copy; 2024 Biometric Access. Todos los derechos reservados.</p>
</footer>
</body>
</html>

<script>
const urlParams = new URLSearchParams(window.location.search);

if(urlParams.has('success')){
    alert("Mensaje enviado correctamente ✅");
}
</script>
