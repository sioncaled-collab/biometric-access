<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Biometric Access</title>
    <link rel="stylesheet" href="/css/estilo_principal.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <img src="/images/Logo B.png" alt="Logo Biometric Access">
            <h1>Login</h1>
        </div>
        <nav class="nav-bar">
            <ul class="menu">
                <li><a href="/">Inicio</a></li>
                <li><a href="/sobre-nosotros">Sobre Nosotros</a></li>
                <li><a href="/servicios">Servicios</a></li>
                <li><a href="/formulario-de-contacto">Contacto</a></li>
                <li><a href="/login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="banner_login">
            <h1>Bienvenido</h1>
            <p>Inicia sesión para continuar</p>
        </section>

        <div class="container_login">
            <div class="image-field">
                <img src="/images/img23.jpeg" alt="Login Image">
            </div>

            <div class="text-field_login">
                <h1>Iniciar Sesión</h1>

                <form action="/login" method="post">
                    <div class="input-group-login">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>
                    </div>

                    <div class="input-group-login">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="contrasena" placeholder="Ingresa tu contraseña" required>
                    </div>

                    <button type="submit" class="card-button">Ingresar</button>
                </form>

                <p th:if="${param.error}" style="color:red; margin-top:10px;">
                    Credenciales incorrectas.
                </p>

                <p th:if="${param.rolerror}" style="color:red; margin-top:10px;">
                    El usuario no tiene un rol válido.
                </p>

                <p class="register-link_login">
                    ¿No tienes una cuenta? <a href="registro.html">Regístrate</a>
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Biometric Access. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
