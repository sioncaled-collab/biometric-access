spring.application.name=ProyectWeb

# ==============================

# PUERTO

# Railway usa PORT automáticamente.

# En local usa 8080.

# ==============================

server.port=${PORT:8080}

# ==============================

# CONFIGURACIÓN DE CORREO

# Recomendado: usar variables de entorno, no dejar la clave quemada.

# ==============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:adsobiometricacces@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================

# LOGS DETALLADOS HTTP

# ==============================

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# ==============================

# CONFIGURACIÓN BASE DE DATOS MYSQL

# Local:

# localhost:3306/login_db

#

# Railway:

# MYSQLHOST

# MYSQLPORT

# MYSQLDATABASE

# MYSQLUSER

# MYSQLPASSWORD

# ==============================

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:login_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# ==============================

# JPA / HIBERNATE

# ==============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================

# ARCHIVOS / MULTIPART

# ==============================

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==============================

# THYMELEAF

# ==============================

spring.thymeleaf.cache=false
